# git-aps configuration
diff:
  # What to diff: "staged", "unstaged", "head" (last commit), or "branch" (vs main)
  mode: staged

rules:
  magic_numbers:
    enabled: true
    threshold: 2  # ignore 0, 1, 2
  deep_nesting:
    enabled: true
    max_depth: 3
  long_functions:
    enabled: true
    max_lines: 50
  many_params:
    enabled: true
    max_params: 5
  todo_comments:
    enabled: true
  error_ignored:
    enabled: true

# custom_rules:
